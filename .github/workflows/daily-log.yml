name: Daily School Log Notification

on:
  # No `schedule:` trigger here - GitHub's own cron scheduler is "best effort"
  # and can be delayed unpredictably (sometimes by an hour or more), which is
  # unacceptable for a daily 5 PM notification. Instead, an external cron
  # service calls the workflow_dispatch API below at exactly 17:00 IST every
  # day - see the README for setup. This event also covers manual test runs
  # from the Actions tab or the API.
  workflow_dispatch:
    inputs:
      test_run:
        description: "Set true only for a deliberate manual test with a specific target_date. Leave false for the real daily trigger - it always processes today, ignoring target_date/TARGET_DATE."
        required: false
        type: boolean
        default: false
      target_date:
        description: "Optional date to process (DD/MM/YYYY). Only used when test_run is true."
        required: false

jobs:
  send-daily-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Resolve target date
        id: resolve
        run: |
          # The real daily trigger (the external cron hitting this same
          # workflow_dispatch event) never sets test_run, so this defaults to
          # false and always processes "today" - even if a TARGET_DATE
          # variable was left set from a previous manual test. Only an
          # explicit test_run=true dispatch honors target_date/TARGET_DATE.
          if [ "${{ github.event.inputs.test_run }}" = "true" ]; then
            echo "target_date=${{ github.event.inputs.target_date || vars.TARGET_DATE }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_date=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily log agent
        env:
          SCHOOL_BASE_URL: ${{ vars.SCHOOL_BASE_URL }}
          SCHOOL_USER_ID: ${{ secrets.SCHOOL_USER_ID }}
          SCHOOL_PASSWORD: ${{ secrets.SCHOOL_PASSWORD }}
          NOTIFICATION_CHANNEL: ${{ vars.NOTIFICATION_CHANNEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ vars.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TEMPLATE_SID: ${{ vars.TWILIO_WHATSAPP_TEMPLATE_SID }}
          WHATSAPP_TO_NUMBER: ${{ secrets.WHATSAPP_TO_NUMBER }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          CIRCULAR_DELIVERY_MODE: ${{ vars.CIRCULAR_DELIVERY_MODE }}
          TARGET_DATE: ${{ steps.resolve.outputs.target_date }}
        run: python -m daily_log_agent.main
